    <div class="common-group-container">
      <div class="common-group">
        <button type="button" class="common-group-button home-button">
          <svg class="common-group-icon home-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z" />
          </svg>
          <h3>Home</h3>
        </button>
      </div>
        <div class="common-group">
          <button type="button" class="common-group-button today-button">
          <svg class="common-group-icon today-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M7,10H12V15H7M19,19H5V8H19M19,3H18V1H16V3H8V1H6V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3Z" />
          </svg>
          <h3>Today</h3>
        </button>
        </div>
        <div class="common-group">
          <button type="button" class="common-group-button overdue-button">
            <svg class="common-group-icon overdue-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M20 12H22V18H20V12M20 20H22V22H20V20M12 2C6.5 2 2 6.5 2 12S6.5 22 12 22C14.3 22 16.3 21.2 18 20V10H21.8C20.9 5.4 16.8 2 12 2M16.2 16.2L11 13V7H12.5V12.2L17 14.9L16.2 16.2Z" />
            </svg>
            <h3>Overdue</h3>
          </button>
        </div>
        <div class="common-group">
          <button type="button" class="common-group-button upcoming-expand">
            <svg class="common-group-icon upcoming-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M15,13H16.5V15.82L18.94,17.23L18.19,18.53L15,16.69V13M19,8H5V19H9.67C9.24,18.09 9,17.07 9,16A7,7 0 0,1 16,9C17.07,9 18.09,9.24 19,9.67V8M5,21C3.89,21 3,20.1 3,19V5C3,3.89 3.89,3 5,3H6V1H8V3H16V1H18V3H19A2,2 0 0,1 21,5V11.1C22.24,12.36 23,14.09 23,16A7,7 0 0,1 16,23C14.09,23 12.36,22.24 11.1,21H5M16,11.15A4.85,4.85 0 0,0 11.15,16C11.15,18.68 13.32,20.85 16,20.85A4.85,4.85 0 0,0 20.85,16C20.85,13.32 18.68,11.15 16,11.15Z" />
            </svg>
            <h3>Upcoming</h3>
            <svg class="common-group-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z" />
            </svg>
          </button>
        </div>
      <div class="common-group">
        <button type="button" class="common-group-button priority-button">
          <svg class="common-group-icon priority-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M10 3H14V14H10V3M10 21V17H14V21H10Z" />
          </svg>
          <h3>Priority</h3>
          <svg class="common-group-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z" />
          </svg>
        </button>
      </div>

      <div class="common-group">
        <button type="button" class="common-group-button completed-button">
          <svg class="common-group-icon completed-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M9,20.42L2.79,14.21L5.62,11.38L9,14.77L18.88,4.88L21.71,7.71L9,20.42Z" />
          </svg>
          <h3>Completed</h3>
        </button>
      </div>
      </div>
    </div>
    <div class="task-group-options">
      <button class="add-task-group-button">
        <svg class="add-task-group-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M20 14H14V20H10V14H4V10H10V4H14V10H20V14Z" />
        </svg>
        <h3>New Group</h3>
      </button>
    </div>
    <div class="task-group-container">
      <div class="task-group">
        <div class="task-group-header">
          <h3 class="task-group-title">Task Group Task Group Task Group</h3>
          <button class="task-group-expand">
          <svg class="task-group-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z" />
          </svg>
        </div>
      </button>
      <ul class="task-group-task-list">
        <li class="task-group-task"><div class="task-priority-circle"></div>Task Task </li>
      </ul>
    </div>
    </div>
  </section>

  <main class="main-content">

    <h2 class="task-list-title">Home</h2>
    <div class="task-card-container">

      <div class="task-card">
        <div class="task-card-priority-indicator"></div>
        <div class="task-card-header">
            <h3 class="task-card-title">TaskTaskTaskTaskTaskTask</h3>
            <div class="task-card-header-button-container">
            <button class="task-card-icon-button  task-card-edit-icon-button">
              <svg class="task-card-icon task-edit-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.06,6.18L3,17.25Z" />
              </svg>
            </button>
            <button class="task-card-icon-button  task-complete-icon-button">
              <svg class="task-card-icon  task-card-complete-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 2C6.5 2 2 6.5 2 12S6.5 22 12 22 22 17.5 22 12 17.5 2 12 2M10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z" />
              </svg>
            </button>
          </div>
        </div>
        <p class="task-card-due">01/01/2001 by 10:00pm</p>
        <p class="task-card-description">Example Description AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWWWWWWWWWWWWWWWW XXXXXXXXXXXXXXXXXXXX</p>
        <div class="task-card-checklist">
          <label for="subtask1"><input type="checkbox" id="subtask1">subtask1</label>
          <label for="subtask2"><input type="checkbox" id="subtask2">subtask2</label>
          <label for="subtask3"><input type="checkbox" id="subtask3">subtask3</label>
          <label for="subtask4"><input type="checkbox" id="subtask4">subtask4</label>
          <label for="subtask5"><input type="checkbox" id="subtask5">subtask5</label>
        </div>
        <p class="task-card-timestamp">timestamp</p>
        <div class="task-card-show-icon-button-container">
          <button class="task-card-icon-button task-card-show-next-icon-button">
            <svg class="task-card-icon task-card-show-next-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z" />
            </svg>
          </button>
          <button class="task-card-icon-button  task-card-show-all-icon-button">
            <svg class="task-card-icon  task-card-show-all-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M16.59,5.59L18,7L12,13L6,7L7.41,5.59L12,10.17L16.59,5.59M16.59,11.59L18,13L12,19L6,13L7.41,11.59L12,16.17L16.59,11.59Z" />
            </svg>
          </button>
        </div>
      </div>
    </div>
